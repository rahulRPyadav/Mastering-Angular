<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center py-3">
          <h3 class="mb-0">User Registration Form</h3>
        </div>

        <div class="card-body">

          <form [formGroup]="userForm" (ngSubmit)="submitForm()">

            <div class="mb-3">
              <label class="form-label fw-bold">Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter Name"
                formControlName="name">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Email</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter Email"
                formControlName="email">
            </div>

            <div formGroupName="address">

              <h5 class="text-primary">Address</h5>

              <div class="row">

                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Street</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Street"
                    formControlName="street">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">City</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="City"
                    formControlName="city">
                </div>

              </div>

            </div>

            <div formArrayName="phoneNumbers">

              <h5 class="text-primary">Phone Numbers</h5>

              <div
                *ngFor="let phoneCtrl of phoneNumbers.controls; let i = index"
                class="row mb-3 align-items-end">

                <div class="col-md-8">

                  <label class="form-label fw-bold">
                    Phone Number {{ i + 1 }}
                  </label>

                  <input
                    type="text"
                    class="form-control"
                    [formControlName]="i"
                    placeholder="Enter Phone Number">

                </div>

                <div class="col-md-4">

                  <button
                    type="button"
                    class="btn btn-danger w-100"
                    (click)="removePhoenNumber(i)">
                    Remove
                  </button>

                </div>

              </div>

              <button
                type="button"
                class="btn btn-success mb-3"
                (click)="addPhoneNumber()">
                + Add Phone Number
              </button>

            </div>

            <div class="text-center">
              <button
                type="submit"
                class="btn btn-primary px-5"
                [disabled]="userForm.invalid">
                Submit
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>

  <!-- User Table -->

  <div class="row mt-5" *ngIf="userList.length > 0">

    <div class="col-12">

      <div class="card shadow">

        <div class="card-header bg-success text-white">
          <h4 class="mb-0">Submitted Users</h4>
        </div>

        <div class="card-body">

          <table class="table table-bordered table-hover">

            <thead class="table-dark">

              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Street</th>
                <th>City</th>
                <th>Phone Numbers</th>
              </tr>

            </thead>

            <tbody>

              <tr *ngFor="let user of userList">

                <td>{{ user.name }}</td>

                <td>{{ user.email }}</td>

                <td>{{ user.address.street }}</td>

                <td>{{ user.address.city }}</td>

                <td>
                  <span *ngFor="let phone of user.phoneNumbers; let last = last">
                    {{ phone }}<span *ngIf="!last">, </span>
                  </span>
                </td>

              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
